version: 0.2

env:
  variables:
    IMAGE_REPO_NAME: springboot-cicd
    IMAGE_TAG: latest
    AWS_DEFAULT_REGION: ap-south-1
    ACCOUNT_ID: "263842073259"

phases:
  pre_build:
    commands:
      - echo "==== Logging in to Amazon ECR ===="
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - echo "==== Ensuring ECR repository exists ===="
      - aws ecr describe-repositories --repository-names $IMAGE_REPO_NAME || aws ecr create-repository --repository-name $IMAGE_REPO_NAME
      - echo "==== Pre-build completed ===="

  build:
    commands:
      - echo "==== Building Spring Boot jar ===="
      - mvn clean package -DskipTests
      - echo "==== Verifying jar ===="
      - ls -l target/
      - echo "==== Building Docker image ===="
      - docker build -t $IMAGE_REPO_NAME:$IMAGE_TAG .
      - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:$IMAGE_TAG
      - echo "==== Docker image built ===="

  post_build:
    commands:
      - echo "==== Pushing Docker image to ECR ===="
      - docker push $ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:$IMAGE_TAG
      - echo "==== Writing imagedefinitions.json ===="
      - printf '[{"name":"springboot-app","imageUri":"%s.dkr.ecr.%s.amazonaws.com/%s:%s"}]' $ACCOUNT_ID $AWS_DEFAULT_REGION $IMAGE_REPO_NAME $IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json